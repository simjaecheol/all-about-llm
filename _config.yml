# 사이트 기본 설정
title: All About LLM
description: LLM Documents for Starters!
remote_theme: just-the-docs/just-the-docs
baseurl: /all-about-llm
url: https://simjaecheol.github.io

permalink: pretty

mermaid: true

defaults:
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: "default"

# 색상 설정
color_scheme: dark
mermaid_theme: dark

# 검색 설정
search_enabled: true
search:
  heading_level: 2
  preview: 2

# 사이드바 설정
aux_links:
  "Github": "https://github.com/simjaecheol/all-about-llm"

# 추가 설정
# Mermaid is enabled globally via 'mermaid: true' above.

exclude:
  - GEMINI.md
  - LICENSE
  - README.md
  - requirements.txt
  - setup_black.py
  - pyproject.toml
  - Gemfile
  - Gemfile.lock
  - .pre-commit-config.yaml
  - .github
  - .agents
  - .jekyll-cache
  - .vscode
  - node_modules
  - vendor